<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGA - Uniremington</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Fondo con gradiente dinámico */
        body { 
            background: linear-gradient(135deg, #004a99 0%, #002d5f 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor tipo Glassmorphism */
        .card-login { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 420px; 
            padding: 2.5rem !important;
            transition: all 0.4s ease;
        }

        .card-login:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .logo-container {
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        h2 {
            color: #004a99;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
            margin-left: 5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #eee;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #004a99;
            box-shadow: 0 0 0 0.25rem rgba(0, 74, 153, 0.1);
        }

        /* Botón estilo Remington Pro */
        .btn-remington { 
            background: linear-gradient(to right, #004a99, #0066cc);
            color: white; 
            border: none;
            border-radius: 12px; 
            padding: 14px; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s; 
            margin-top: 1rem;
        }

        .btn-remington:hover { 
            background: linear-gradient(to right, #003570, #004a99);
            transform: scale(1.02);
            color: white;
            box-shadow: 0 10px 20px rgba(0, 74, 153, 0.3);
        }

        .footer-text {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<div class="card-login animate__animated animate__fadeIn">
    <div class="text-center logo-container">
        <div class="logo-icon">🎓</div>
        <h2>SGA Uniremington</h2>
        <p class="text-muted small">Sistema de Gestión Académica</p>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Usuario (Documento)</label>
        <input type="text" id="usuario" class="form-control" placeholder="Ingrese su ID" required>
    </div>
    <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
    </div>
    
    <button onclick="login()" class="btn btn-remington w-100">Iniciar Sesión</button>

    <div class="text-center footer-text">
        &copy; 2026 Uniremington - Montería
    </div>
</div>

<script>
    // Tu lógica de login se mantiene igual, pero ahora se ve mejor
    function login() {
        const usuario = document.getElementById('usuario').value;
        const password = document.getElementById('password').value;

        if (!usuario || !password) {
            Swal.fire({
                title: '¡Faltan datos!',
                text: 'Eche, llena todos los campos primero.',
                icon: 'warning',
                confirmButtonColor: '#004a99'
            });
            return;
        }

        fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                localStorage.setItem('userNombre', data.nombre);
                Swal.fire({
                    icon: 'success',
                    title: '¡Bienvenido, ' + data.nombre + '!',
                    text: 'Entrando al sistema...',
                    showConfirmButton: false,
                    timer: 1500,
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = '/'; 
                });
            } else {
                Swal.fire({
                    title: 'Error de acceso',
                    text: 'Documento o clave incorrectos.',
                    icon: 'error',
                    confirmButtonColor: '#004a99'
                });
            }
        })
        .catch(err => {
            console.error(err);
            Swal.fire('Error', 'No hay conexión con el servidor de Oracle', 'error');
        });
    }
</script>

</body>
</html>
